name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          JWT_SECRET_ADMIN: ci-test-admin-secret

      - name: Check if version already published
        id: check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️  ${PKG_NAME}@${PKG_VERSION} already published — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "📦 ${PKG_NAME}@${PKG_VERSION} not yet published — will publish"
          fi

      - name: Publish main package
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish sub-packages
        run: |
          for dir in sdk wab-mcp-adapter packages/react packages/vue packages/svelte packages/langchain; do
            if [ -f "$dir/package.json" ]; then
              SUB_NAME=$(node -p "require('./$dir/package.json').name")
              SUB_VERSION=$(node -p "require('./$dir/package.json').version")
              PUBLISHED=$(npm view "${SUB_NAME}@${SUB_VERSION}" version 2>/dev/null || echo "")
              if [ "$PUBLISHED" = "$SUB_VERSION" ]; then
                echo "⏭️  ${SUB_NAME}@${SUB_VERSION} already published — skipping"
              else
                echo "📦 Publishing ${SUB_NAME}@${SUB_VERSION}..."
                cd "$dir"
                npm publish --access public
                cd "$GITHUB_WORKSPACE"
              fi
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
