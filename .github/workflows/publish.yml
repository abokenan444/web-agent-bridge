name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          JWT_SECRET_ADMIN: ci-test-admin-secret

      - name: Publish main package
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          npm publish --access public 2>&1 || {
            if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null | grep -q "$PKG_VERSION"; then
              echo "⏭️  ${PKG_NAME}@${PKG_VERSION} already published — skipping"
            else
              echo "❌ Failed to publish ${PKG_NAME}@${PKG_VERSION}"
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish sub-packages
        run: |
          for dir in sdk wab-mcp-adapter packages/react packages/vue packages/svelte packages/langchain; do
            if [ -f "$dir/package.json" ]; then
              SUB_NAME=$(node -p "require('./$dir/package.json').name")
              SUB_VERSION=$(node -p "require('./$dir/package.json').version")
              echo "📦 Publishing ${SUB_NAME}@${SUB_VERSION}..."
              cd "$dir"
              npm publish --access public 2>&1 || {
                if npm view "${SUB_NAME}@${SUB_VERSION}" version 2>/dev/null | grep -q "$SUB_VERSION"; then
                  echo "⏭️  ${SUB_NAME}@${SUB_VERSION} already published — skipping"
                else
                  echo "❌ Failed to publish ${SUB_NAME}@${SUB_VERSION}"
                fi
              }
              cd "$GITHUB_WORKSPACE"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
