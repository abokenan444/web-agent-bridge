name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          JWT_SECRET_ADMIN: ci-test-admin-secret

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t web-agent-bridge .

      - name: Verify Docker image
        run: |
          docker run -d --name wab-test -p 3000:3000 \
            -e JWT_SECRET=docker-test-secret \
            -e JWT_SECRET_ADMIN=docker-admin-test-secret \
            web-agent-bridge
          for i in 1 2 3 4 5 6; do
            sleep 5
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is healthy"
              break
            fi
            echo "Waiting for server... attempt $i"
            if [ "$i" = "6" ]; then
              echo "Server failed to start:"
              docker logs wab-test
              exit 1
            fi
          done
          docker stop wab-test
          docker rm wab-test
