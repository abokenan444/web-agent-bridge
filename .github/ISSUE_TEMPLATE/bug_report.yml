name: Bug Report 🐛
description: Create a report to help us improve Web Agent Bridge
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Before you submit, please check if the issue has already been reported.

  - type: input
    id: version
    attributes:
      label: WAB Version
      description: What version of Web Agent Bridge are you using?
      placeholder: e.g. 2.5.0
    validations:
      required: true

  - type: dropdown
    id: integration
    attributes:
      label: Integration Type
      description: How are you running WAB?
      options:
        - Standalone (Node.js/Docker)
        - WordPress Plugin
        - Cloudflare Worker
        - Shared Hosting (PHP)
        - Vercel/Netlify
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs or Screenshots
      description: If applicable, add error logs, console output, or screenshots to help explain your problem.
      render: shell

  - type: input
    id: env
    attributes:
      label: Environment
      description: e.g. OS, Node version, Browser version
      placeholder: e.g. Ubuntu 22.04, Node 18.16, Chrome 114

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
