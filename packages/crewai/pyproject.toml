[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "web-agent-bridge-crewai"
version = "0.1.0"
description = "CrewAI / LangChain-Python tool wrapper for Web Agent Bridge — discover, verify revocation, then execute against any WAB-enabled site."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [
  { name = "Web Agent Bridge", email = "hello@webagentbridge.com" }
]
keywords = ["crewai", "langchain", "agents", "llm-tools", "web-agent-bridge", "wab"]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules"
]
dependencies = [
  "httpx>=0.25,<1.0",
  "pydantic>=2.0,<3.0"
]

[project.optional-dependencies]
crewai = ["crewai-tools>=0.5"]
langchain = ["langchain-core>=0.1"]
dev = ["pytest>=7", "pytest-httpx>=0.30", "ruff>=0.1"]

[project.urls]
Homepage = "https://webagentbridge.com"
Documentation = "https://webagentbridge.com/docs.html"
Source = "https://github.com/abokenan444/web-agent-bridge"
Issues = "https://github.com/abokenan444/web-agent-bridge/issues"

[tool.setuptools.packages.find]
include = ["wab_crewai*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
