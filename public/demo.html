<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAB Protocol Demo — Real AI Agent ↔ Store Interaction</title>
  <meta name="description" content="Watch a real AI agent interact with a remote WAB-enabled store via HTTP protocol. Discovery, cart management, checkout — all through structured commands.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#080c14;color:#e2e8f0;min-height:100vh;overflow-x:hidden}

    .demo-nav{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e293b;background:#0a0f1a}
    .demo-nav a{color:#94a3b8;text-decoration:none;font-size:0.85rem}
    .demo-nav a:hover{color:#f1f5f9}
    .demo-nav .title{font-weight:800;font-size:1rem;color:#f1f5f9;display:flex;align-items:center;gap:8px}
    .demo-nav .title span{background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

    .main-grid{display:grid;grid-template-columns:420px 1fr;height:calc(100vh - 50px);overflow:hidden}
    @media(max-width:900px){.main-grid{grid-template-columns:1fr;height:auto}}

    /* LEFT: Store iframe */
    .store-panel{border-right:1px solid #1e293b;display:flex;flex-direction:column}
    .store-panel .panel-label{padding:10px 16px;background:#0f1629;border-bottom:1px solid #1e293b;font-size:0.75rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between}
    .store-panel .panel-label .live{color:#10b981;display:flex;align-items:center;gap:6px;font-size:0.7rem}
    .store-panel .panel-label .live::before{content:'';width:6px;height:6px;background:#10b981;border-radius:50%;animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .store-panel iframe{flex:1;border:none;background:#f8fafc;min-height:500px}

    /* RIGHT: Agent Panel */
    .agent-panel{display:flex;flex-direction:column;overflow:hidden}
    .agent-header{padding:16px 20px;background:#0f1629;border-bottom:1px solid #1e293b}
    .agent-header h2{font-size:1rem;font-weight:700;margin-bottom:4px}
    .agent-header .subtitle{font-size:0.78rem;color:#64748b}
    .agent-header .target{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:#3b82f6;margin-top:6px;word-break:break-all}

    .agent-controls{padding:12px 20px;background:#0c1220;border-bottom:1px solid #1e293b;display:flex;gap:8px;flex-wrap:wrap}
    .ctrl-btn{padding:7px 14px;border-radius:6px;border:1px solid #1e293b;background:#0f1629;color:#e2e8f0;font-family:inherit;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap}
    .ctrl-btn:hover{border-color:#3b82f6;background:#111d33}
    .ctrl-btn.primary{background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-color:transparent;color:#fff}
    .ctrl-btn.primary:hover{opacity:0.9}
    .ctrl-btn:disabled{opacity:0.4;cursor:not-allowed}

    .chat-row{padding:10px 20px;background:#0c1220;border-bottom:1px solid #1e293b;display:flex;gap:8px}
    .chat-input{flex:1;background:#111827;border:1px solid #1e293b;border-radius:6px;padding:9px 12px;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:0.82rem;outline:none}
    .chat-input:focus{border-color:#3b82f6}
    .send-btn{background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:9px 16px;font-weight:600;cursor:pointer;font-family:inherit;font-size:0.82rem}

    /* Network Log */
    .network-log{flex:1;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:0.75rem;line-height:1.7;padding:0}
    .network-log::-webkit-scrollbar{width:5px}
    .network-log::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}

    .log-group{border-bottom:1px solid #111827;padding:0}
    .log-group-header{padding:8px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.1s}
    .log-group-header:hover{background:#0f1629}
    .log-group-header .method{font-weight:700;min-width:40px}
    .log-group-header .method.GET{color:#10b981}
    .log-group-header .method.POST{color:#f59e0b}
    .log-group-header .url{color:#94a3b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .log-group-header .status{min-width:32px;text-align:right}
    .log-group-header .status.s2{color:#10b981}
    .log-group-header .status.s4{color:#ef4444}
    .log-group-header .timing{color:#64748b;min-width:50px;text-align:right}
    .log-group-header .arrow{color:#475569;font-size:0.65rem;transition:transform 0.2s}
    .log-group-header .arrow.open{transform:rotate(90deg)}

    .log-group-body{display:none;padding:0 20px 12px;background:#0a0f1a}
    .log-group-body.open{display:block}
    .log-section{margin-top:8px}
    .log-section-title{color:#475569;font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
    .log-json{background:#080c14;border:1px solid #1e293b;border-radius:6px;padding:10px 12px;overflow-x:auto;white-space:pre-wrap;word-break:break-word;color:#cbd5e1;max-height:200px;overflow-y:auto}
    .log-json .key{color:#8b5cf6}
    .log-json .str{color:#10b981}
    .log-json .num{color:#f59e0b}
    .log-json .bool{color:#3b82f6}

    .agent-msg{padding:8px 20px;border-bottom:1px solid #111827}
    .agent-msg.think{color:#8b5cf6;font-style:italic}
    .agent-msg.system{color:#475569}
    .agent-msg.user{color:#60a5fa}
    .agent-msg.result{color:#10b981}
    .agent-msg.error{color:#ef4444}

    .phase-indicator{padding:6px 20px;background:#0f172a;border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:8px}
    .phase-dot{width:8px;height:8px;border-radius:50%;background:#1e293b}
    .phase-dot.active{background:#3b82f6;box-shadow:0 0 8px rgba(59,130,246,0.5)}
    .phase-dot.done{background:#10b981}
    .phase-label{font-size:0.7rem;color:#64748b;text-transform:uppercase;letter-spacing:0.5px}
    .phase-label.active{color:#3b82f6;font-weight:600}
    .phase-label.done{color:#10b981}
    .phase-sep{color:#1e293b}
  </style>
</head>
<body>

<div class="demo-nav">
  <div class="title">⚡ <span>WAB</span> Protocol Demo</div>
  <div style="display:flex;gap:16px;align-items:center">
    <a href="/">Home</a>
    <a href="/docs">Docs</a>
    <a href="https://github.com/abokenan444/web-agent-bridge" target="_blank">GitHub</a>
  </div>
</div>

<div class="main-grid">
  <!-- LEFT: Remote Store -->
  <div class="store-panel">
    <div class="panel-label">
      <span>Remote WAB Store</span>
      <span class="live">Live on Railway</span>
    </div>
    <iframe id="store-frame" src="https://web-agent-bridge-production.up.railway.app"></iframe>
  </div>

  <!-- RIGHT: Agent -->
  <div class="agent-panel">
    <div class="agent-header">
      <h2>🤖 WAB Agent</h2>
      <div class="subtitle">Interacting with remote store via WAB Protocol over HTTP</div>
      <div class="target">Target: https://web-agent-bridge-production.up.railway.app</div>
    </div>

    <!-- Phase Indicator -->
    <div class="phase-indicator" id="phases">
      <div class="phase-dot" id="ph-discover"></div><span class="phase-label" id="pl-discover">Discover</span>
      <span class="phase-sep">→</span>
      <div class="phase-dot" id="ph-plan"></div><span class="phase-label" id="pl-plan">Plan</span>
      <span class="phase-sep">→</span>
      <div class="phase-dot" id="ph-execute"></div><span class="phase-label" id="pl-execute">Execute</span>
      <span class="phase-sep">→</span>
      <div class="phase-dot" id="ph-confirm"></div><span class="phase-label" id="pl-confirm">Confirm</span>
    </div>

    <!-- Controls -->
    <div class="agent-controls">
      <button class="ctrl-btn primary" id="btn-full">▶ Run Full Shopping Agent</button>
      <button class="ctrl-btn" id="btn-discover">Discover</button>
      <button class="ctrl-btn" id="btn-list">List Products</button>
      <button class="ctrl-btn" id="btn-search">Search</button>
      <button class="ctrl-btn" id="btn-cart">View Cart</button>
      <button class="ctrl-btn" id="btn-clear">Clear Log</button>
    </div>

    <div class="chat-row">
      <input class="chat-input" id="cmd-input" placeholder='Try: "buy the cheapest item" or {"action":"listProducts"}'>
      <button class="send-btn" id="btn-send">Send</button>
    </div>

    <!-- Network Log -->
    <div class="network-log" id="log"></div>
  </div>
</div>

<script>
(function() {
  const STORE = 'https://web-agent-bridge-production.up.railway.app';
  const logEl = document.getElementById('log');
  let requestId = 0;
  let busy = false;

  // ── Phase management ──────────────────────────────
  function setPhase(name, state) {
    const dot = document.getElementById('ph-' + name);
    const label = document.getElementById('pl-' + name);
    dot.className = 'phase-dot' + (state ? ' ' + state : '');
    label.className = 'phase-label' + (state ? ' ' + state : '');
  }
  function resetPhases() {
    ['discover','plan','execute','confirm'].forEach(p => setPhase(p, ''));
  }

  // ── Logging ───────────────────────────────────────
  function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = 'agent-msg ' + (type || 'system');
    div.textContent = text;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function syntaxHighlight(json) {
    if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
    return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
      let cls = 'num';
      if (/^"/.test(match)) { cls = /:$/.test(match) ? 'key' : 'str'; }
      else if (/true|false/.test(match)) { cls = 'bool'; }
      return '<span class="' + cls + '">' + match + '</span>';
    });
  }

  function addNetworkEntry(method, url, reqBody, resBody, status, duration) {
    const id = ++requestId;
    const group = document.createElement('div');
    group.className = 'log-group';

    const statusClass = status >= 200 && status < 300 ? 's2' : 's4';
    const shortUrl = url.replace(STORE, '');

    group.innerHTML =
      '<div class="log-group-header" data-id="' + id + '">' +
        '<span class="arrow" id="arrow-' + id + '">▶</span>' +
        '<span class="method ' + method + '">' + method + '</span>' +
        '<span class="url">' + shortUrl + '</span>' +
        '<span class="status ' + statusClass + '">' + status + '</span>' +
        '<span class="timing">' + duration + 'ms</span>' +
      '</div>' +
      '<div class="log-group-body" id="body-' + id + '">' +
        (reqBody ? '<div class="log-section"><div class="log-section-title">Request Body</div><div class="log-json">' + syntaxHighlight(reqBody) + '</div></div>' : '') +
        '<div class="log-section"><div class="log-section-title">Response · ' + status + ' · ' + duration + 'ms</div><div class="log-json">' + syntaxHighlight(resBody) + '</div></div>' +
      '</div>';

    group.querySelector('.log-group-header').addEventListener('click', function() {
      const body = document.getElementById('body-' + id);
      const arrow = document.getElementById('arrow-' + id);
      body.classList.toggle('open');
      arrow.classList.toggle('open');
    });

    logEl.appendChild(group);
    logEl.scrollTop = logEl.scrollHeight;
    return resBody;
  }

  // ── HTTP calls ────────────────────────────────────
  async function wabGet(path) {
    const url = STORE + path;
    const start = performance.now();
    const res = await fetch(url);
    const data = await res.json();
    const duration = Math.round(performance.now() - start);
    addNetworkEntry('GET', url, null, data, res.status, duration);
    return data;
  }

  async function wabExecute(action, params) {
    const url = STORE + '/wab/execute';
    const body = { action, params: params || {} };
    const start = performance.now();
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    const duration = Math.round(performance.now() - start);
    addNetworkEntry('POST', url, body, data, res.status, duration);
    return data;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ── Agent Actions ─────────────────────────────────
  async function doDiscover() {
    setPhase('discover', 'active');
    addMessage('Fetching discovery document from remote store...', 'think');
    const doc = await wabGet('/.well-known/wab.json');
    addMessage('Discovered ' + doc.actions.length + ' actions on "' + doc.site.name + '" (' + doc.site.category + ')', 'result');
    setPhase('discover', 'done');
    return doc;
  }

  async function doListProducts() {
    return await wabExecute('listProducts');
  }

  async function doSearch(query) {
    return await wabExecute('searchProducts', { query });
  }

  async function doViewCart() {
    return await wabExecute('viewCart');
  }

  // ── Full Shopping Agent ───────────────────────────
  async function runFullAgent() {
    if (busy) return;
    busy = true;
    document.getElementById('btn-full').disabled = true;
    resetPhases();
    logEl.innerHTML = '';

    addMessage('Agent session started', 'system');
    addMessage('Target: ' + STORE, 'system');
    await sleep(300);

    // Phase 1: Discover
    const doc = await doDiscover();
    await sleep(500);

    // Phase 2: Plan
    setPhase('plan', 'active');
    addMessage('Planning: I have ' + doc.actions.length + ' actions available. Goal: find the cheapest product and purchase it.', 'think');
    await sleep(600);
    addMessage('Step 1: listProducts → find cheapest', 'think');
    addMessage('Step 2: addToCart → add to cart', 'think');
    addMessage('Step 3: checkout → complete order', 'think');
    setPhase('plan', 'done');
    await sleep(400);

    // Phase 3: Execute
    setPhase('execute', 'active');

    addMessage('Executing step 1: Listing all products...', 'think');
    const listData = await wabExecute('listProducts');
    const products = listData.result.products;
    addMessage('Found ' + products.length + ' products', 'result');
    await sleep(400);

    const cheapest = products.reduce((a, b) => a.price < b.price ? a : b);
    addMessage('Analysis: cheapest is "' + cheapest.name + '" at ' + cheapest.priceFormatted + ' (stock: ' + cheapest.stock + ')', 'think');
    await sleep(400);

    addMessage('Executing step 2: Adding "' + cheapest.name + '" to cart...', 'think');
    const addData = await wabExecute('addToCart', { productId: cheapest.id, quantity: 1 });
    if (addData.success) {
      addMessage('Added to cart. Total: ' + addData.result.cartTotal, 'result');
    } else {
      addMessage('Failed: ' + addData.result.error, 'error');
    }
    await sleep(400);

    addMessage('Verifying cart before checkout...', 'think');
    const cartData = await wabExecute('viewCart');
    addMessage('Cart: ' + cartData.result.itemCount + ' item(s), total ' + cartData.result.total, 'result');
    await sleep(400);

    addMessage('Executing step 3: Checkout...', 'think');
    const orderData = await wabExecute('checkout', { email: 'agent@webagentbridge.com' });
    if (orderData.success) {
      addMessage('Order placed! ID: ' + orderData.result.orderId + ' — Total: ' + orderData.result.total, 'result');
    } else {
      addMessage('Checkout failed: ' + orderData.result.error, 'error');
    }
    setPhase('execute', 'done');
    await sleep(400);

    // Phase 4: Confirm
    setPhase('confirm', 'active');
    if (orderData.success) {
      addMessage('Confirming order status...', 'think');
      const statusData = await wabExecute('getOrderStatus', { orderId: orderData.result.orderId });
      addMessage('Order ' + statusData.result.orderId + ' status: ' + statusData.result.status, 'result');
    }

    addMessage('Fetching audit log to verify all actions were recorded...', 'think');
    await wabGet('/wab/audit');
    addMessage('All actions confirmed in audit log', 'result');
    setPhase('confirm', 'done');

    await sleep(300);
    addMessage('✅ Agent session complete — 4 lifecycle phases, ' + requestId + ' real HTTP requests to remote store', 'system');

    refreshStore();

    busy = false;
    document.getElementById('btn-full').disabled = false;
  }

  function refreshStore() {
    const frame = document.getElementById('store-frame');
    try { frame.contentWindow.postMessage({ source: 'wab-agent', type: 'refresh' }, '*'); } catch(e) {}
    setTimeout(function() { frame.src = STORE + '?t=' + Date.now(); }, 300);
  }

  // ── Natural language handler ──────────────────────
  async function handleInput(text) {
    if (busy) return;
    text = text.trim();
    if (!text) return;
    busy = true;

    // Try as raw JSON
    if (text.startsWith('{')) {
      try {
        const parsed = JSON.parse(text);
        if (parsed.action) {
          addMessage('Executing raw command: ' + parsed.action, 'user');
          await wabExecute(parsed.action, parsed.params);
          if (['addToCart','removeFromCart','checkout'].includes(parsed.action)) refreshStore();
          busy = false;
          return;
        }
      } catch(e) {}
    }

    addMessage('User: ' + text, 'user');
    const lower = text.toLowerCase();

    if (lower.includes('discover') || lower.includes('what can')) {
      await doDiscover();
    } else if (lower.includes('list') || lower.includes('products') || lower.includes('catalog') || lower.includes('show')) {
      addMessage('Agent: Listing products...', 'think');
      const d = await doListProducts();
      if (d.success) addMessage('Found ' + d.result.total + ' products', 'result');
    } else if (lower.includes('search') || lower.includes('find')) {
      const q = text.replace(/^.*?(search|find)\s*(for)?\s*/i, '').trim() || 'keyboard';
      addMessage('Agent: Searching for "' + q + '"...', 'think');
      const d = await doSearch(q);
      if (d.success) addMessage('Found ' + d.result.total + ' results for "' + d.result.query + '"', 'result');
    } else if (lower.includes('cart') || lower.includes('basket')) {
      addMessage('Agent: Checking cart...', 'think');
      const d = await doViewCart();
      addMessage('Cart: ' + d.result.itemCount + ' items, total ' + d.result.total, 'result');
    } else if (lower.includes('buy') || lower.includes('purchase') || lower.includes('cheapest') || lower.includes('order')) {
      await runFullAgent();
      busy = false;
      return;
    } else if (lower.includes('ping') || lower.includes('health')) {
      await wabGet('/wab/ping');
    } else if (lower.includes('audit') || lower.includes('log')) {
      await wabGet('/wab/audit');
    } else {
      addMessage('Agent: I can handle: discover, list products, search [term], view cart, buy cheapest, ping, audit log, or raw JSON like {"action":"listProducts"}', 'think');
    }
    busy = false;
  }

  // ── Store ↔ Agent sync via postMessage ─────────────
  window.addEventListener('message', function(e) {
    if (!e.data || e.data.source !== 'wab-store') return;
    const d = e.data;
    if (d.type === 'cart-update') {
      addMessage('🛒 [Store UI] User added "' + d.detail.product + '" to cart → ' + d.detail.cartItems + ' item(s), total ' + d.detail.cartTotal, 'result');
    } else if (d.type === 'cart-error') {
      addMessage('⚠ [Store UI] Failed to add "' + d.detail.product + '": ' + d.detail.error, 'error');
    } else if (d.type === 'store-ready') {
      addMessage('Store connected: ' + d.detail.name, 'system');
    }
  });

  // ── Event bindings ────────────────────────────────
  document.getElementById('btn-full').addEventListener('click', runFullAgent);
  document.getElementById('btn-discover').addEventListener('click', function() { if (!busy) { busy = true; doDiscover().then(function() { busy = false; }); }});
  document.getElementById('btn-list').addEventListener('click', function() { if (!busy) { busy = true; addMessage('Listing products...', 'think'); doListProducts().then(function() { busy = false; }); }});
  document.getElementById('btn-search').addEventListener('click', function() {
    const q = prompt('Search query:');
    if (q && !busy) { busy = true; addMessage('Searching: ' + q, 'think'); doSearch(q).then(function() { busy = false; }); }
  });
  document.getElementById('btn-cart').addEventListener('click', function() { if (!busy) { busy = true; doViewCart().then(function() { busy = false; }); }});
  document.getElementById('btn-clear').addEventListener('click', function() { logEl.innerHTML = ''; resetPhases(); requestId = 0; });
  document.getElementById('btn-send').addEventListener('click', function() {
    const input = document.getElementById('cmd-input');
    handleInput(input.value);
    input.value = '';
  });
  document.getElementById('cmd-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { handleInput(this.value); this.value = ''; }
  });
})();
</script>
</body>
</html>
