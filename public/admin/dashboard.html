<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overview — WAB Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>
</head>
<body>
<script>
const { api, escapeHtml: H } = AdminShell;
AdminShell.init({
  page: 'overview',
  mount: async (root) => {
    root.innerHTML = ''
      + '<div class="admin-page">'
      + '<h1>Platform Overview</h1>'
      + '<p class="page-sub">Health snapshot. Each section in the sidebar is its own dedicated, DB-backed page.</p>'
      + '<div id="stats" class="grid stats-grid" style="margin:18px 0;"><div class="empty">Loading...</div></div>'
      + '<div id="govPanel"></div>'
      + '<div class="card" style="padding:18px;margin-top:24px;"><h3 style="margin:0 0 8px;">Where to go next</h3>'
      + '<ul style="list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">'
      + '<li><a class="btn btn-ghost" href="/admin/users">Users</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/sites">Sites</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/governance">Governance</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/grants">Free Grants</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/payments">Payments</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/stripe">Stripe</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/smtp">SMTP</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/notifications">Notifications</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/analytics">Analytics</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/discovery">Discovery</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/trust">Trust</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/providers">Providers</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/outreach">Outreach</a></li>'
      + '<li><a class="btn btn-ghost" href="/admin/snapshots">Snapshots</a></li>'
      + '</ul></div></div>';
    function box(label, value, sub) {
      return '<div class="stat-card"><div class="stat-label">' + H(label)
        + '</div><div class="stat-value">' + H(value) + '</div>'
        + (sub ? '<div class="stat-sub">' + H(sub) + '</div>' : '') + '</div>';
    }
    const stats = await api('/api/admin/stats').catch(() => ({}));
    document.getElementById('stats').innerHTML = [
      box('Users', stats.users || 0),
      box('Sites', stats.sites || 0),
      box('Active subs', stats.active_subscriptions || stats.activeSubs || 0),
      box('Revenue (30d)', '$' + (((stats.revenue30d || 0) / 100).toFixed(2)),
          'Stripe ' + (stats.stripeConfigured ? 'configured' : 'not configured')),
    ].join('');
    try {
      const g = await api('/api/admin/governance/stats');
      if (g && g.enabled) {
        const t = g.totals || {};
        document.getElementById('govPanel').innerHTML =
          '<h2 style="margin-top:24px;">Governance snapshot</h2>' +
          '<div class="grid stats-grid">' +
            box('Agents', t.agents || 0, (t.alive || 0) + ' alive / ' + (t.killed || 0) + ' killed') +
            box('Policies', t.policies || 0) +
            box('Audit events', t.audit_events || 0, 'HMAC chained') +
            box('Pending approvals', t.pending_approvals || 0, 'Awaiting human') +
          '</div>' +
          '<div style="text-align:right;margin-top:8px;">' +
            '<a class="btn btn-secondary btn-sm" href="/admin/governance">Open governance &rarr;</a>' +
          '</div>';
      }
    } catch (e) { /* ignore */ }
  },
});
</script>
</body>
</html>
