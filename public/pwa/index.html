<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f23">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WAB Browser">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="WAB Browser — متصفح ذكي بحجب الإعلانات ودرع الاحتيال ونظام العدالة">
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="apple-touch-icon" href="/pwa/icons/icon-192.svg">
  <link rel="stylesheet" href="/pwa/app.css">
  <title>WAB Browser</title>
</head>
<body>
  <!-- ══════ Top Bar ══════ -->
  <header id="top-bar">
    <div id="url-bar">
      <button id="menu-toggle" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 20 20"><line x1="3" y1="5" x2="17" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="15" x2="17" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div id="url-input-wrap">
        <span id="secure-icon">
          <svg width="12" height="12" viewBox="0 0 14 14"><rect x="3" y="6" width="8" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M5 6V4a2 2 0 014 0v2" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        </span>
        <input id="url-input" type="text" inputmode="url" placeholder="ابحث أو أدخل عنوان..." autocomplete="off" spellcheck="false" />
      </div>
      <button id="go-btn" aria-label="Go">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M3 9h12M11 5l4 4-4 4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </header>

  <!-- ══════ Webview Area ══════ -->
  <main id="browser-frame">
    <iframe id="web-view" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox" allowfullscreen></iframe>
    <!-- Home / New Tab Screen -->
    <div id="home-screen">
      <div class="home-logo">
        <svg width="64" height="64" viewBox="0 0 120 120">
          <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#10b981"/></linearGradient></defs>
          <circle cx="60" cy="60" r="54" fill="none" stroke="url(#lg)" stroke-width="2.5"/>
          <path d="M36 78 L48 42 L60 66 L72 42 L84 78" fill="none" stroke="url(#lg)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="60" cy="36" r="5" fill="#0ea5e9"/>
        </svg>
        <h1>WAB Browser</h1>
        <p>المتصفح الذكي — مع حجب الإعلانات ونظام العدالة</p>
      </div>
      <div id="quick-links">
        <a class="quick-link" data-url="https://duckduckgo.com">🔍<span>بحث</span></a>
        <a class="quick-link" data-url="https://youtube.com">▶️<span>يوتيوب</span></a>
        <a class="quick-link" data-url="https://wikipedia.org">📚<span>ويكيبيديا</span></a>
        <a class="quick-link" data-url="https://github.com">💻<span>GitHub</span></a>
      </div>
      <div id="home-features">
        <div class="home-feat" id="feat-adblock">
          <span class="feat-icon">🛡️</span>
          <span class="feat-label">حجب الإعلانات</span>
          <span class="feat-badge" id="home-adblock-count">0</span>
        </div>
        <div class="home-feat" id="feat-shield">
          <span class="feat-icon">🔰</span>
          <span class="feat-label">درع الاحتيال</span>
          <span class="feat-status safe">آمن</span>
        </div>
        <div class="home-feat" id="feat-fairness">
          <span class="feat-icon">⚖️</span>
          <span class="feat-label">نظام العدالة</span>
        </div>
      </div>
    </div>
    <!-- Loading overlay -->
    <div id="loading-bar" class="hidden"></div>
  </main>

  <!-- ══════ Bottom Toolbar ══════ -->
  <nav id="bottom-bar">
    <button id="btn-back" disabled aria-label="Back">
      <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4L6 10l6 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="btn-forward" disabled aria-label="Forward">
      <svg width="20" height="20" viewBox="0 0 20 20"><path d="M8 4l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="btn-home" aria-label="Home">
      <svg width="20" height="20" viewBox="0 0 20 20"><path d="M4 10.5V17h5v-4h2v4h5V10.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M2 11l8-8 8 8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="btn-adblock" class="active" aria-label="Ad Blocker">
      <svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="7.5" fill="none" stroke="currentColor" stroke-width="1.4"/><line x1="4.5" y1="4.5" x2="15.5" y2="15.5" stroke="currentColor" stroke-width="1.5"/></svg>
      <span class="toolbar-badge" id="adblock-badge">0</span>
    </button>
    <button id="btn-shield" aria-label="Shield">
      <svg width="20" height="20" viewBox="0 0 20 20"><path d="M10 2L3.5 5.5v4.5C3.5 14.5 6.3 18 10 19c3.7-1 6.5-4.5 6.5-9V5.5L10 2z" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M7 10l2 2 4-4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="btn-chat" aria-label="Agent Chat">
      <svg width="20" height="20" viewBox="0 0 20 20"><path d="M3 3h14v10H7l-4 4V3z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><circle cx="7.5" cy="8" r="0.9" fill="currentColor"/><circle cx="10" cy="8" r="0.9" fill="currentColor"/><circle cx="12.5" cy="8" r="0.9" fill="currentColor"/></svg>
    </button>
  </nav>

  <!-- ══════ Side Menu ══════ -->
  <div id="side-menu" class="hidden">
    <div id="menu-overlay"></div>
    <div id="menu-panel">
      <div class="menu-header">
        <h2>WAB Browser</h2>
        <button id="menu-close">✕</button>
      </div>
      <div class="menu-items">
        <button class="menu-item" data-action="home"><span>🏠</span>الصفحة الرئيسية</button>
        <button class="menu-item" data-action="adblock-toggle"><span>🛡️</span>حجب الإعلانات <small id="menu-adblock-status" class="on">مفعّل</small></button>
        <button class="menu-item" data-action="fairness"><span>⚖️</span>نظام العدالة</button>
        <button class="menu-item" data-action="shield"><span>🔰</span>درع الاحتيال</button>
        <button class="menu-item" data-action="agent"><span>🤖</span>وكيل WAB</button>
        <div class="menu-divider"></div>
        <button class="menu-item" data-action="bookmarks"><span>🔖</span>المفضلة</button>
        <button class="menu-item" data-action="history"><span>📜</span>السجل</button>
        <div class="menu-divider"></div>
        <button class="menu-item" data-action="share"><span>📤</span>مشاركة الصفحة</button>
        <button class="menu-item" data-action="desktop"><span>💻</span>عرض سطح المكتب</button>
        <button class="menu-item" data-action="clear"><span>🗑️</span>مسح البيانات</button>
        <div class="menu-divider"></div>
        <div class="menu-about">
          <small>WAB Browser PWA v1.0.0</small><br>
          <small style="color:var(--text-muted)">webagentbridge.com</small>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════ Chat Panel ══════ -->
  <div id="chat-panel" class="hidden">
    <div id="chat-header">
      <span>🤖 وكيل WAB</span>
      <button id="chat-close">✕</button>
    </div>
    <div id="chat-messages">
      <div class="chat-msg agent">مرحباً! أنا وكيل WAB. كيف أساعدك؟</div>
    </div>
    <div id="chat-input-area">
      <input type="text" id="chat-input" placeholder="اسأل الوكيل..." autocomplete="off" />
      <button id="chat-send">➤</button>
    </div>
  </div>

  <!-- ══════ Toast ══════ -->
  <div id="toast-container"></div>

  <script src="/pwa/app.js"></script>
</body>
</html>
