# ==============================================================================
# WAB WebSocket Protocol Specification (v1.0.0)
# ==============================================================================
# This document defines the expected behavior, events, and message structures
# for the Web Agent Bridge (WAB) WebSocket connections.
#
# Endpoints:
# - Agent Connection: wss://webagentbridge.com/ws/agent
# - Analytics Connection: wss://webagentbridge.com/ws/analytics
# ==============================================================================

version: "1.0.0"
protocol: "wab-ws-protocol"

connection:
  handshake:
    required_headers:
      - "Authorization: Bearer <token>"
      - "X-WAB-Client-Version: <version>"
    query_params:
      - "siteId: <string>" (Optional for analytics, required for agent)
  
  heartbeat:
    interval_ms: 30000
    timeout_ms: 5000
    ping_message: { "type": "ping" }
    pong_message: { "type": "pong" }
    behavior: "Server sends ping every 30s. Client must respond with pong within 5s or connection drops."

events:
  client_to_server:
    - name: "auth_init"
      description: "Sent immediately after connection if token wasn't in headers"
      payload:
        type: "object"
        properties:
          token: { type: "string", required: true }
          siteId: { type: "string", required: true }

    - name: "action_request"
      description: "Agent requests to perform an action on the page"
      payload:
        type: "object"
        properties:
          actionId: { type: "string", required: true }
          params: { type: "object", required: false }
          context: { type: "object", required: false }

    - name: "page_subscribe"
      description: "Subscribe to DOM changes for a specific URL"
      payload:
        type: "object"
        properties:
          url: { type: "string", required: true }

  server_to_client:
    - name: "auth_success"
      description: "Authentication successful, connection ready"
      payload:
        type: "object"
        properties:
          sessionId: { type: "string" }
          capabilities: { type: "array", items: { type: "string" } }

    - name: "action_result"
      description: "Result of an executed action"
      payload:
        type: "object"
        properties:
          actionId: { type: "string" }
          status: { type: "string", enum: ["success", "failed", "blocked"] }
          data: { type: "object" }
          error: { type: "string", required: false }

    - name: "dom_mutation"
      description: "Pushed when subscribed page changes"
      payload:
        type: "object"
        properties:
          url: { type: "string" }
          mutations: { type: "array", items: { type: "object" } }

    - name: "security_alert"
      description: "Pushed when Anti-Hallucination or Threat engine blocks an action"
      payload:
        type: "object"
        properties:
          level: { type: "string", enum: ["warning", "critical"] }
          reason: { type: "string" }
          actionId: { type: "string" }

error_handling:
  codes:
    4000: "Invalid JSON payload"
    4001: "Unauthorized / Invalid Token"
    4002: "Rate limit exceeded"
    4003: "Action blocked by security policy"
    4004: "Site ID not found or inactive"
  
  behavior: "On critical errors (4001, 4004), server sends error frame and closes connection with code 1008."

rate_limits:
  messages_per_second: 50
  payload_size_limit_kb: 128
  behavior: "Exceeding limits triggers a 4002 error frame. Repeated violations lead to IP ban."
